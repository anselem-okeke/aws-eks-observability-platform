clusterName: opensearch
nodeGroup: main

singleNode: true
replicas: 1

roles:
  - master
  - ingest
  - data

opensearchJavaOpts: "-Xms512m -Xmx512m"

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "1"
    memory: "2Gi"

persistence:
  enabled: true
  storageClass: gp3
  size: 20Gi

extraEnvs:
  - name: DISABLE_SECURITY_PLUGIN
    value: "true"
  - name: DISABLE_INSTALL_DEMO_CONFIG
    value: "true"

config:
  opensearch.yml: |
    cluster.name: opensearch
    network.host: 0.0.0.0
    discovery.type: single-node
    plugins.security.disabled: true

service:
  type: ClusterIP
  httpPortName: http
  transportPortName: transport