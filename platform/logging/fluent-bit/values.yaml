kind: DaemonSet

serviceAccount:
  create: true
  name: fluent-bit

rbac:
  create: true

serviceMonitor:
  enabled: true
  namespace: logging

config:
  service: |
    [SERVICE]
        Daemon Off
        Flush 5
        Log_Level info
        Parsers_File parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020
        Health_Check On

  inputs: |
    [INPUT]
        Name tail
        Path /var/log/containers/*.log
        multiline.parser docker, cri
        Tag kube.*
        Mem_Buf_Limit 10MB
        Skip_Long_Lines On

  filters: |
    [FILTER]
        Name kubernetes
        Match kube.*
        Merge_Log On
        Keep_Log Off
        K8S-Logging.Parser On
        K8S-Logging.Exclude Off

  outputs: |
    [OUTPUT]
        Name opensearch
        Match kube.*
        Host opensearch-main.logging.svc.cluster.local
        Port 9200
        Index kubernetes-logs
        Suppress_Type_Name On
        tls Off
        Trace_Error On
        Replace_Dots On