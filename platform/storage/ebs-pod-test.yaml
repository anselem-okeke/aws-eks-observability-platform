apiVersion: v1
kind: Pod
metadata:
  name: ebs-gp3-test-pod
  namespace: storage-test
spec:
  containers:
    - name: app
      image: public.ecr.aws/docker/library/busybox:latest
      command:
        - sh
        - -c
        - |
          echo "EBS CSI storage test successful" > /data/test.txt
          cat /data/test.txt
          sleep 3600
      volumeMounts:
        - name: test-storage
          mountPath: /data
  volumes:
    - name: test-storage
      persistentVolumeClaim:
        claimName: ebs-gp3-test-pvc
