apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-alert-rules
  namespace: monitoring
  labels:
    release: kps
    app.kubernetes.io/name: platform-alert-rules
    app.kubernetes.io/part-of: aws-sre-observability-platform
spec:
  groups:
    - name: platform.health
      rules:
        - alert: PlatformNodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: critical
            area: platform
          annotations:
            summary: "Kubernetes node is not Ready"
            description: "Node {{ $labels.node }} has been NotReady for more than 5 minutes."

        - alert: PlatformPodCrashLooping
          expr: kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"} == 1
          for: 5m
          labels:
            severity: warning
            area: platform
          annotations:
            summary: "Pod is CrashLoopBackOff"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is in CrashLoopBackOff."

        - alert: PlatformPVCStuckPending
          expr: kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
          for: 5m
          labels:
            severity: warning
            area: platform
          annotations:
            summary: "PVC is stuck Pending"
            description: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} has been Pending for more than 5 minutes."

        - alert: EBSCSIControllerUnavailable
          expr: kube_deployment_status_replicas_available{namespace="kube-system",deployment="ebs-csi-controller"} < 1
          for: 5m
          labels:
            severity: critical
            area: storage
          annotations:
            summary: "EBS CSI controller unavailable"
            description: "The EBS CSI controller has no available replicas for more than 5 minutes."

        - alert: AWSLoadBalancerControllerUnavailable
          expr: kube_deployment_status_replicas_available{namespace="kube-system",deployment="aws-load-balancer-controller"} < 1
          for: 5m
          labels:
            severity: critical
            area: ingress
          annotations:
            summary: "AWS Load Balancer Controller unavailable"
            description: "The AWS Load Balancer Controller has no available replicas for more than 5 minutes."

        - alert: MonitoringStackGrafanaUnavailable
          expr: kube_deployment_status_replicas_available{namespace="monitoring",deployment="kps-grafana"} < 1
          for: 5m
          labels:
            severity: warning
            area: monitoring
          annotations:
            summary: "Grafana unavailable"
            description: "Grafana has no available replicas for more than 5 minutes."

        - alert: PlatformHighClusterCPU
          expr: |
            100 * (
              sum(rate(container_cpu_usage_seconds_total{container!="",pod!=""}[5m]))
              /
              sum(kube_node_status_allocatable{resource="cpu"})
            ) > 80
          for: 10m
          labels:
            severity: warning
            area: capacity
          annotations:
            summary: "Cluster CPU usage is high"
            description: "Cluster CPU usage has been above 80% for more than 10 minutes."

        - alert: PlatformHighClusterMemory
          expr: |
            100 * (
              sum(container_memory_working_set_bytes{container!="",pod!=""})
              /
              sum(kube_node_status_allocatable{resource="memory"})
            ) > 85
          for: 10m
          labels:
            severity: warning
            area: capacity
          annotations:
            summary: "Cluster memory usage is high"
            description: "Cluster memory usage has been above 85% for more than 10 minutes."